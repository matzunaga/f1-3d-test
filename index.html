<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>F1 3D v0 test — Silverstone, real telemetry, ghost laps</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.120.0/Cesium.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.120.0/Widgets/widgets.css" rel="stylesheet">
<style>
  html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
  #status { position: absolute; top: 10px; left: 10px; z-index: 999; background: #0D0D0D; color: #E8FF00;
            font-family: monospace; font-size: 13px; padding: 10px 14px; max-width: 480px; white-space: pre-wrap; }
  #controls { position: absolute; bottom: 14px; left: 14px; z-index: 999; display: flex; flex-wrap: wrap;
              align-items: center; gap: 14px; background: rgba(13,13,13,0.75); padding: 12px 16px; border-radius: 6px; }
  button { background:#0D0D0D; color:#F0EDE6; border:1px solid #E8FF00; padding:14px 22px; font-family:monospace;
           font-size: 15px; cursor:pointer; border-radius: 4px; }
  button:hover { background:#1a1a1a; }
  #rotWrap { color:#F0EDE6; font-family:monospace; font-size:14px; display:flex; align-items:center; gap:8px; }
  #rotSlider { width: 220px; vertical-align: middle; }
</style>
</head>
<body>
<div id="status">Loading...</div>
<div id="controls">
  <button id="playBtn">Play next lap</button>
  <button id="overviewBtn">Overview (top-down)</button>
  <label id="rotWrap">
    Rotation: <span id="rotVal">0</span>°
    <input id="rotSlider" type="range" min="0" max="359" value="0">
  </label>
  <label id="rotWrap">
    Zoom: <span id="zoomVal">1.0</span>x
    <input id="zoomSlider" type="range" min="30" max="400" value="100">
  </label>
  <label id="rotWrap">
    Shift E/W: <span id="panEVal">0</span>m
    <input id="panESlider" type="range" min="-1000" max="1000" value="0">
  </label>
  <label id="rotWrap">
    Shift N/S: <span id="panNVal">0</span>m
    <input id="panNSlider" type="range" min="-1000" max="1000" value="0">
  </label>
</div>
<div id="cesiumContainer"></div>

<script>
/* ============================================================
   BEFORE THIS RUNS:

   Paste your Cesium ion token below where it says
   YOUR_CESIUM_ION_TOKEN. Get one (or a fresh one, if the old
   one was rotated) at ion.cesium.com -> Access Tokens.
   Never commit a real token to this file in a public repo —
   paste it locally only, or wire it through Netlify env vars
   if this needs to work on the deployed site.
   ============================================================ */

const CESIUM_ION_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJmYjU2ZGRhNy00YzFlLTRlNmItYjIyZC02NGVkZTE3NDVkNWEiLCJpZCI6NDUzNTM3LCJzdWIiOiJNYXR6dW5hZ2EiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiRjEgdGVzdGluZyAiLCJpYXQiOjE3ODM1MjA2OTd9.YKRKC1nre1fGJqU5NhdN6YFPVpMGzxW1sMuRrOY15yQ";

const MUNICH_CENTERLINE_URL = "https://raw.githubusercontent.com/TUMFTM/racetrack-database/master/tracks/Silverstone.csv";

// Rotation is now a live slider (bottom left) — drag it and the yellow
// line redraws in real time against the satellite imagery. No more
// edit-commit-redeploy-screenshot loops to find the right angle.
let ROTATION_OFFSET_DEG = 0;
const HEIGHT_ABOVE_TRACK = 150;
const DISTANCE_BEHIND = 60;
const CAMERA_PITCH_DEG = -60;

// Zoom multiplier, driven by the Zoom slider. playLap() forces the
// camera to an exact position every frame — pinch-to-zoom gestures were
// getting silently overridden the very next frame, which felt like
// "fighting." This slider is read inside that same per-frame update
// instead, so zoom actually sticks during playback.
let zoomMultiplier = 1.0;

// Live position offset, in real meters east and north of the anchor —
// driven by the two Shift sliders. Fixes a translation error (anchor
// point not exactly matching the CSV's start point in real life)
// separately from rotation, which is a different kind of error.
let panEastM = 0;
let panNorthM = 0;

function rotateXY(dx, dy, angleDeg) {
  const rad = Cesium.Math.toRadians(angleDeg);
  return {
    x: dx * Math.cos(rad) - dy * Math.sin(rad),
    y: dx * Math.sin(rad) + dy * Math.cos(rad),
  };
}

const statusEl = document.getElementById("status");
function log(msg) {
  console.log(msg);
  statusEl.textContent = msg;
}

try {
  if (typeof Cesium === "undefined") {
    throw new Error("Cesium library never loaded — likely a slow or blocked connection to cdnjs.cloudflare.com. Try reloading, or switch networks (wifi vs cellular).");
  }
  Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
} catch (err) {
  statusEl.textContent = "FAILED before setup: " + err.message;
  throw err;
}

let viewer;
let centerlineLatLon = [];  // real-world [lon, lat] pairs, from Munich data
let carFrames = [];         // OpenF1 position samples, in arrival order
let trackPolylineEntity = null;

async function init() {
  log("Setting up Cesium viewer...");
  viewer = new Cesium.Viewer("cesiumContainer", {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    baseLayerPicker: false,
    timeline: false,
    animation: false,
  });
  viewer.scene.primitives.add(await Cesium.createOsmBuildingsAsync());

  try {
    await Promise.all([loadMunichCenterline(), loadOpenF1Data()]);
    recomputeGeometry();

    log("Data loaded. Position samples: " + carFrames.length +
        " | Centerline points: " + centerlineLatLon.length +
        " | Ghost buffer laps: " + lapBuffers.length +
        "\nDrag Rotation to match the track, tap Overview to check, or Play next lap.");

    document.getElementById("playBtn").onclick = () => playLap();
    document.getElementById("overviewBtn").onclick = () => showOverview();
    document.getElementById("rotSlider").oninput = (e) => {
      ROTATION_OFFSET_DEG = Number(e.target.value);
      document.getElementById("rotVal").textContent = ROTATION_OFFSET_DEG;
      recomputeGeometry();
    };
    document.getElementById("zoomSlider").oninput = (e) => {
      zoomMultiplier = Number(e.target.value) / 100;
      document.getElementById("zoomVal").textContent = zoomMultiplier.toFixed(1);
    };
    document.getElementById("panESlider").oninput = (e) => {
      panEastM = Number(e.target.value);
      document.getElementById("panEVal").textContent = panEastM;
      recomputeGeometry();
    };
    document.getElementById("panNSlider").oninput = (e) => {
      panNorthM = Number(e.target.value);
      document.getElementById("panNVal").textContent = panNorthM;
      recomputeGeometry();
    };
  } catch (err) {
    log("FAILED: " + err.message + "\n\nCheck the setup step at the top of this file.");
    console.error(err);
  }
}

// Flies straight above the whole track so the entire yellow polyline is
// visible against the satellite imagery in one shot.
function showOverview() {
  const sphere = Cesium.BoundingSphere.fromPoints(centerlineCartesians);
  viewer.camera.flyToBoundingSphere(sphere, {
    offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-90), sphere.radius * 2.5),
    duration: 1.5,
  });
}

// --- Step 1: real track geometry (Munich database) ---
// ANCHOR: Silverstone's real-world coordinates, confirmed via multiple
// sources. Local file meters get placed against this real point.
const ANCHOR_LAT = 52.0717;
const ANCHOR_LON = -1.0159;
let centerlineCartesians = [];
let centerlineHeadings = [];  // per-point track heading, radians, for camera aim

async function loadMunichCenterline() {
  const res = await fetch(MUNICH_CENTERLINE_URL);
  if (!res.ok) throw new Error("Munich centerline fetch failed (" + res.status + "). Check the filename — see comment at top of file.");
  const text = await res.text();
  const lines = text.trim().split("\n").filter(l => !l.startsWith("#"));
  centerlineLatLon = lines.map(line => {
    const [x, y] = line.split(",").map(Number);
    return { x_m: x, y_m: y };
  });
}

// Rebuilds all rotation-dependent geometry (track line, headings, car
// telemetry, ghost buffers) from the current ROTATION_OFFSET_DEG value.
// Called once at load, then again live every time the slider moves.
function recomputeGeometry() {
  const x0 = centerlineLatLon[0].x_m;
  const y0 = centerlineLatLon[0].y_m;
  const anchorCartesian = Cesium.Cartesian3.fromDegrees(ANCHOR_LON, ANCHOR_LAT, 0);
  const enuMatrix = Cesium.Transforms.eastNorthUpToFixedFrame(anchorCartesian);

  centerlineCartesians = centerlineLatLon.map(pt => {
    const r = rotateXY(pt.x_m - x0, pt.y_m - y0, ROTATION_OFFSET_DEG);
    return Cesium.Matrix4.multiplyByPoint(enuMatrix, new Cesium.Cartesian3(r.x + panEastM, r.y + panNorthM, 0), new Cesium.Cartesian3());
  });

  centerlineHeadings = centerlineLatLon.map((pt, i) => {
    const next = centerlineLatLon[(i + 1) % centerlineLatLon.length];
    const r = rotateXY(next.x_m - pt.x_m, next.y_m - pt.y_m, ROTATION_OFFSET_DEG);
    return Math.atan2(r.x, r.y);
  });

  mapCarTelemetryToRealWorld();
  buildLapBuffers();

  if (trackPolylineEntity) viewer.entities.remove(trackPolylineEntity);
  trackPolylineEntity = viewer.entities.add({
    polyline: {
      positions: centerlineCartesians,
      width: 4,
      material: Cesium.Color.fromCssColorString("#E8FF00"),
      clampToGround: true,
    },
  });
}

// --- Step 2: real car telemetry (OpenF1) ---
async function loadOpenF1Data() {
  const sessRes = await fetch("https://api.openf1.org/v1/sessions?country_name=United Kingdom&year=2026&session_type=Race");
  const sessions = await sessRes.json();
  if (!sessions.length) throw new Error("No 2026 Great Britain race session found in OpenF1.");
  const sessionKey = sessions[0].session_key;

  const drvRes = await fetch(`https://api.openf1.org/v1/drivers?session_key=${sessionKey}`);
  const drivers = await drvRes.json();
  if (!drivers.length) throw new Error("No drivers found for this session.");
  const driver = drivers[0];

  const locRes = await fetch(`https://api.openf1.org/v1/location?session_key=${sessionKey}&driver_number=${driver.driver_number}`);
  carFrames = await locRes.json();
  if (!carFrames.length) throw new Error("No location data returned for driver " + driver.driver_number + ".");
}

// --- Step 3: GHOST BUFFER ---
const REAL_LAP_COUNT_V0 = 5;
const SAMPLES_PER_LAP = 300;
const MAX_GHOSTS = 4;

let carCartesiansAll = [];
let lapBuffers = [];
let currentLapIndex = 0;
let ghostEntities = [];
let liveCarEntity = null;

function mapCarTelemetryToRealWorld() {
  const x0 = carFrames[0].x;
  const y0 = carFrames[0].y;
  const anchorCartesian = Cesium.Cartesian3.fromDegrees(ANCHOR_LON, ANCHOR_LAT, 0);
  const enuMatrix = Cesium.Transforms.eastNorthUpToFixedFrame(anchorCartesian);
  carCartesiansAll = carFrames.map(f => {
    const r = rotateXY(f.x - x0, f.y - y0, ROTATION_OFFSET_DEG);
    return Cesium.Matrix4.multiplyByPoint(enuMatrix, new Cesium.Cartesian3(r.x + panEastM, r.y + panNorthM, 0), new Cesium.Cartesian3());
  });
}

function buildLapBuffers() {
  const perLap = Math.floor(carCartesiansAll.length / REAL_LAP_COUNT_V0);
  lapBuffers = [];
  for (let lap = 0; lap < REAL_LAP_COUNT_V0; lap++) {
    const start = lap * perLap;
    const chunk = carCartesiansAll.slice(start, start + perLap);
    lapBuffers.push(resampleToFixedSteps(chunk, SAMPLES_PER_LAP));
  }
}

function resampleToFixedSteps(points, steps) {
  if (points.length < 2) {
    const fallback = points[0] || Cesium.Cartesian3.ZERO;
    return new Array(steps).fill(fallback);
  }
  const out = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / (steps - 1)) * (points.length - 1);
    const i0 = Math.floor(t);
    const i1 = Math.min(i0 + 1, points.length - 1);
    const frac = t - i0;
    out.push(Cesium.Cartesian3.lerp(points[i0], points[i1], frac, new Cesium.Cartesian3()));
  }
  return out;
}

function clearGhostEntities() {
  ghostEntities.forEach(e => viewer.entities.remove(e));
  ghostEntities = [];
  if (liveCarEntity) {
    viewer.entities.remove(liveCarEntity);
    liveCarEntity = null;
  }
}

// --- Step 4: playback — camera flythrough + live car + ghost laps ---
function playLap() {
  if (!centerlineCartesians.length || !lapBuffers.length) { log("Data not ready — can't play."); return; }
  clearGhostEntities();

  const ghostLapIndices = [];
  for (let g = currentLapIndex - 1; g >= 0 && ghostLapIndices.length < MAX_GHOSTS; g--) {
    ghostLapIndices.push(g);
  }

  ghostEntities = ghostLapIndices.map((lapIdx, order) => {
    const age = order + 1;
    return viewer.entities.add({
      point: {
        pixelSize: 10,
        color: Cesium.Color.fromCssColorString("#E8FF00").withAlpha(Math.max(0.15, 1 - age * 0.22)),
      },
      position: lapBuffers[lapIdx][0],
    });
  });

  liveCarEntity = viewer.entities.add({
    point: { pixelSize: 14, color: Cesium.Color.fromCssColorString("#FF3C3C") },
    position: centerlineCartesians[0],
  });

  const total = centerlineCartesians.length;
  let i = 0;
  log("Playing lap " + (currentLapIndex + 1) + " of " + REAL_LAP_COUNT_V0 +
      " — " + ghostLapIndices.length + " ghost(s) trailing.");

  const interval = setInterval(() => {
    if (i >= total) {
      clearInterval(interval);
      currentLapIndex = (currentLapIndex + 1) % REAL_LAP_COUNT_V0;
      log("Lap complete. Press Play next lap to continue — " +
          Math.min(currentLapIndex, MAX_GHOSTS) + " ghost(s) will trail next time.");
      return;
    }
    const pos = centerlineCartesians[i];
    const nextPos = centerlineCartesians[(i + 1) % total];

    const forward = Cesium.Cartesian3.normalize(
      Cesium.Cartesian3.subtract(nextPos, pos, new Cesium.Cartesian3()),
      new Cesium.Cartesian3()
    );
    const groundNormal = Cesium.Cartesian3.normalize(pos, new Cesium.Cartesian3());
    const cameraPos = Cesium.Cartesian3.add(
      Cesium.Cartesian3.add(
        pos,
        Cesium.Cartesian3.multiplyByScalar(forward, -DISTANCE_BEHIND * zoomMultiplier, new Cesium.Cartesian3()),
        new Cesium.Cartesian3()
      ),
      Cesium.Cartesian3.multiplyByScalar(groundNormal, HEIGHT_ABOVE_TRACK * zoomMultiplier, new Cesium.Cartesian3()),
      new Cesium.Cartesian3()
    );
    viewer.camera.setView({
      destination: cameraPos,
      orientation: {
        heading: centerlineHeadings[i],
        pitch: Cesium.Math.toRadians(CAMERA_PITCH_DEG),
        roll: 0,
      },
    });

    liveCarEntity.position = pos;

    const progressFrac = i / (total - 1);
    ghostEntities.forEach((entity, idx) => {
      const buf = lapBuffers[ghostLapIndices[idx]];
      const gi = Math.min(Math.round(progressFrac * (buf.length - 1)), buf.length - 1);
      entity.position = buf[gi];
    });

    i += 1;
  }, 50);
}

init();
</script>
</body>
</html>
